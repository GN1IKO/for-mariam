:root{
  --night:#14101c; --night-top:#0c0814; --dusk:#2e2036; --horizon:#5a3b4d;
  --leaf:#6f8f6a; --petal:#fbf5f3; --gold:#f0cf86; --gold-deep:#e0ac5a;
  --rose:#d99fb0; --ink:#f5ecf0;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}

.scene{
  position:fixed; inset:0; overflow:hidden;
  background:
    radial-gradient(135% 95% at 50% 122%, var(--horizon) 0%, rgba(90,59,77,0) 52%),
    linear-gradient(180deg, var(--night-top) 0%, var(--night) 40%, var(--dusk) 100%);
  font-family:'NSG','Sylfaen','Noto Serif Georgian',serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}

.dawn{
  position:absolute; left:50%; bottom:-14%; width:130vmax; height:86vmax;
  transform:translateX(-50%) scale(.7);
  background:radial-gradient(50% 50% at 50% 50%,
    rgba(240,207,134,.50) 0%, rgba(217,159,176,.20) 36%, rgba(217,159,176,0) 70%);
  filter:blur(8px); opacity:0; pointer-events:none; z-index:1;
}
.scene.playing .dawn{animation:dawnin 3s ease 1.4s both;}
@keyframes dawnin{from{opacity:0;transform:translateX(-50%) scale(.65);}to{opacity:.85;transform:translateX(-50%) scale(1);}}

.garden{position:absolute; inset:0; z-index:2;}

#motes{position:absolute; inset:0; width:100%; height:100%; z-index:3; pointer-events:none;}

.message{
  position:absolute; left:50%; top:29%; transform:translate(-50%,-50%);
  width:min(92vw,860px); text-align:center; z-index:4; pointer-events:none;
}
.message::before{
  content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:118%; height:215%; z-index:-1; pointer-events:none;
  background:radial-gradient(48% 50% at 50% 50%,
    rgba(11,7,17,.52) 0%, rgba(11,7,17,.30) 44%, rgba(11,7,17,0) 72%);
}
.message>*{opacity:0;}
.name{
  margin:0; font-weight:560; line-height:1; letter-spacing:.01em;
  font-size:clamp(3.2rem,13vw,7.4rem);
  text-shadow:0 0 26px rgba(240,207,134,.32), 0 2px 30px rgba(20,16,28,.55);
  text-wrap:balance;
}
.vow{
  margin-top:.32em; font-weight:300; letter-spacing:.14em;
  font-size:clamp(1.7rem,7.4vw,3.5rem); color:#fdf6f0;
  text-shadow:0 1px 22px rgba(20,16,28,.5);
}
.rule{display:flex; align-items:center; justify-content:center; gap:.7rem; margin:1.45em auto .9em;}
.rule i{display:block; height:1px; width:clamp(34px,9vw,84px);
  background:linear-gradient(90deg,rgba(240,207,134,0),rgba(240,207,134,.75));}
.rule i:last-child{background:linear-gradient(90deg,rgba(240,207,134,.75),rgba(240,207,134,0));}
.rule span{width:5px; height:5px; border-radius:50%; background:var(--gold);
  box-shadow:0 0 8px rgba(240,207,134,.9);}
.forever{
  font-weight:300; letter-spacing:.42em; text-indent:.42em;
  font-size:clamp(.82rem,3.4vw,1.08rem); color:rgba(240,207,134,.86);
  text-transform:none;
}

.scene.playing .name{animation:rise 1.25s cubic-bezier(.2,.7,.3,1) 3.0s both;}
.scene.playing .vow{animation:rise 1.25s cubic-bezier(.2,.7,.3,1) 3.55s both;}
.scene.playing .rule{animation:rise 1.1s ease 4.0s both;}
.scene.playing .forever{animation:rise 1.3s ease 4.35s both;}
@keyframes rise{
  from{opacity:0; transform:translateY(18px); filter:blur(8px);}
  to{opacity:1; transform:translateY(0); filter:blur(0);}
}

/* ---- lilies ---- */
.stem{fill:none; stroke:url(#stemgrad); stroke-linecap:round;
  stroke-dasharray:1; stroke-dashoffset:1;}
.scene.playing .stem{animation:grow 1.5s cubic-bezier(.25,.72,.3,1) var(--d) both;}
@keyframes grow{to{stroke-dashoffset:0;}}

.leaf{fill:url(#leafgrad); transform-box:fill-box; transform-origin:50% 100%;
  transform:scale(.35); opacity:0;}
.scene.playing .leaf{animation:leafin .95s ease var(--ld) both;}
@keyframes leafin{from{opacity:0; transform:scale(.35);}to{opacity:.96; transform:scale(1);}}

.flower{transform-box:fill-box; transform-origin:center; transform:scale(.12); opacity:0;}
.scene.playing .flower{animation:bloom 1.3s cubic-bezier(.2,.72,.26,1.25) var(--bd) both;}
@keyframes bloom{
  0%{transform:scale(.12); opacity:0;}
  55%{opacity:1;}
  72%{transform:scale(1.07);}
  100%{transform:scale(1); opacity:1;}
}

.lily{transform-box:fill-box; transform-origin:50% 100%;}
.scene.playing .lily{animation:sway var(--sw) ease-in-out var(--sd) infinite;}
@keyframes sway{0%,100%{transform:rotate(-1.15deg);}50%{transform:rotate(1.15deg);}}

.petal{fill:url(#petalgrad); stroke:rgba(206,150,170,.22); stroke-width:.6;}
.pb{fill:url(#petalback);}
.throat{fill:url(#throatgrad);}
.core{fill:#fff6dd;}
.anther{fill:var(--gold);}
.fil{fill:none; stroke:var(--gold-deep); stroke-width:2.4; stroke-linecap:round;}
.stamens{transform-box:fill-box; transform-origin:center; opacity:0; transform:scale(.4);
  filter:drop-shadow(0 0 4px rgba(240,207,134,.55));}
.scene.playing .stamens{
  animation:stamenin .85s ease calc(var(--bd) + .5s) both,
            stglow 3.8s ease-in-out calc(var(--bd) + 1.7s) infinite;}
@keyframes stamenin{from{opacity:0; transform:scale(.4);}to{opacity:1; transform:scale(1);}}
@keyframes stglow{
  0%,100%{filter:drop-shadow(0 0 4px rgba(240,207,134,.5));}
  50%{filter:drop-shadow(0 0 11px rgba(240,207,134,.95));}
}

.replay{
  position:absolute; right:18px; bottom:16px; z-index:5;
  appearance:none; border:1px solid rgba(245,236,240,.22); background:rgba(20,16,28,.32);
  color:rgba(245,236,240,.7); font-family:inherit; font-weight:300; font-size:.92rem;
  letter-spacing:.16em; padding:.5rem .95rem; border-radius:999px; cursor:pointer;
  display:inline-flex; align-items:center; gap:.5rem;
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  opacity:0; transition:opacity .6s ease 5s, color .25s ease, border-color .25s ease, background .25s ease;
}
.scene.playing .replay{opacity:.8;}
.replay:hover{color:var(--gold); border-color:rgba(240,207,134,.5); background:rgba(46,32,54,.5);}
.replay:focus-visible{outline:2px solid var(--gold); outline-offset:3px;}
.replay svg{width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2;}

@media (prefers-reduced-motion: reduce){
  .scene.playing .stem{animation:none; stroke-dashoffset:0;}
  .scene.playing .flower{animation:none; transform:scale(1); opacity:1;}
  .scene.playing .leaf{animation:none; opacity:.96; transform:scale(1);}
  .scene.playing .stamens{animation:none; opacity:1; transform:scale(1);}
  .scene.playing .lily{animation:none;}
  .scene.playing .dawn{animation:none; opacity:.78; transform:translateX(-50%) scale(1);}
  .message>*{animation:none!important; opacity:1!important; filter:none!important; transform:translateY(0)!important;}
  .message{transform:translate(-50%,-50%);}
  .replay{transition:none; opacity:.8;}
}
</style>

    </defs>
    <g id="lilies"></g>
  </svg>

  <canvas id="motes"></canvas>

  <div class="message">
    <h1 class="name">&#4315;&#4304;&#4320;&#4312;&#4304;&#4315;</h1>
    <div class="vow">&#4315;&#4312;&#4327;&#4309;&#4304;&#4320;&#4334;&#4304;&#4320;</div>
    <div class="rule"><i></i><span></span><i></i></div>
  </div>

  <button class="replay" id="replay" type="button" aria-label="&#4311;&#4304;&#4309;&#4312;&#4307;&#4304;&#4316;">
    <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-1.6 4.8" stroke-linecap="round"/><path d="M20 5v6h-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    &#4311;&#4304;&#4309;&#4312;&#4307;&#4304;&#4316;
  </button>
</div>

<script>
(function(){
  "use strict";
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var NS = 'http://www.w3.org/2000/svg';
  var PETAL = "M0 0 C -20 -20 -27 -58 -12 -90 C -5 -101 5 -101 12 -90 C 27 -58 20 -20 0 0 Z";
  var LEAF  = "M0 0 C 11 -15 15 -42 4 -67 C 1 -42 -4 -18 0 0 Z";

  // x, y(head), s(size), d(stem delay)
  var lilies = [
    {x:600, y:400, s:1.18, d:1.00},
    {x:432, y:474, s:0.96, d:0.56},
    {x:772, y:486, s:0.99, d:0.64},
    {x:300, y:556, s:0.80, d:0.34},
    {x:902, y:556, s:0.82, d:0.40},
    {x:150, y:626, s:0.62, d:0.16},
    {x:1052,y:626, s:0.64, d:0.22},
    {x:520, y:600, s:0.56, d:0.72},
    {x:700, y:604, s:0.57, d:0.78},
    {x:368, y:624, s:0.54, d:0.46},
    {x:840, y:620, s:0.55, d:0.50},
    {x:226, y:662, s:0.50, d:0.28},
    {x:980, y:660, s:0.50, d:0.30},
    {x:80,  y:692, s:0.46, d:0.10},
    {x:1140,y:692, s:0.46, d:0.13},
    {x:470, y:678, s:0.47, d:0.62},
    {x:740, y:680, s:0.47, d:0.66},
    {x:600, y:676, s:0.50, d:0.88}
  ];

  function petals(){
    var s = '';
    [60,180,300].forEach(function(a){ s += '<path class="petal pb" transform="rotate('+a+') scale(1.06)" d="'+PETAL+'"/>'; });
    [0,120,240].forEach(function(a){ s += '<path class="petal" transform="rotate('+a+')" d="'+PETAL+'"/>'; });
    return s;
  }
  function stamens(){
    var s = '<g class="stamens"><circle class="throat" r="30"/>';
    for(var i=0;i<6;i++){
      var a = i*60*Math.PI/180, r = 30;
      var dx = Math.sin(a)*r, dy = -Math.cos(a)*r;
      s += '<path class="fil" d="M0 0 Q '+(dx*0.4).toFixed(1)+' '+(dy*0.4-4).toFixed(1)+' '+dx.toFixed(1)+' '+dy.toFixed(1)+'"/>';
      s += '<ellipse class="anther" cx="'+dx.toFixed(1)+'" cy="'+dy.toFixed(1)+'" rx="6" ry="3.4" transform="rotate('+(i*60+90)+' '+dx.toFixed(1)+' '+dy.toFixed(1)+')"/>';
    }
    s += '<circle class="core" r="5"/></g>';
    return s;
  }
  function leaf(x, y, rot, d){
    return '<g class="leaf-wrap" style="--ld:'+(d+0.35).toFixed(2)+'s" transform="translate('+x+' '+y.toFixed(1)+') rotate('+rot+')"><path class="leaf" d="'+LEAF+'"/></g>';
  }

  var html = '';
  lilies.forEach(function(l, i){
    var baseY = 826;
    var bd = (l.d + 1.0).toFixed(2);
    var sd = (l.d + 2.2).toFixed(2);
    var sw = (6.2 + (i % 4) * 0.55).toFixed(2);
    var wob = (l.x - 600) * 0.018 + (i % 2 ? 9 : -9);
    var y0 = baseY - (baseY - l.y) * 0.36;
    var y1 = baseY - (baseY - l.y) * 0.72;
    var stem = '<path class="stem" pathLength="1" style="stroke-width:'+(5*l.s).toFixed(2)+'" d="M '+l.x+' '+baseY+' C '+(l.x+wob).toFixed(1)+' '+y0.toFixed(1)+' '+(l.x-wob).toFixed(1)+' '+y1.toFixed(1)+' '+l.x+' '+l.y+'"/>';

    var lmidA = l.y + (baseY - l.y) * 0.46;
    var lmidB = l.y + (baseY - l.y) * 0.68;
    var leaves = leaf(l.x, lmidA, -40, l.d) + leaf(l.x, lmidB, 42, l.d);
    if (l.s < 0.66) leaves = leaf(l.x, lmidA, -38, l.d);

    var head = '<g class="head" transform="translate('+l.x+' '+l.y+') scale('+l.s+')"><g class="flower">'+petals()+stamens()+'</g></g>';

    html += '<g class="lily" style="--d:'+l.d+'s;--bd:'+bd+'s;--sd:'+sd+'s;--sw:'+sw+'s">'+stem+leaves+head+'</g>';
  });
  document.getElementById('lilies').innerHTML = html;

  /* ---- ambient pollen / light motes ---- */
  var cv = document.getElementById('motes');
  var ctx = cv.getContext('2d');
  var W = 0, H = 0, DPR = 1;
  var colors = ['#fff3d6', '#f0cf86', '#d99fb0', '#fdf7f1'];
  var sprites = colors.map(function(c){
    var sc = document.createElement('canvas'); sc.width = sc.height = 48;
    var sx = sc.getContext('2d');
    var g = sx.createRadialGradient(24,24,0,24,24,24);
    g.addColorStop(0, c); g.addColorStop(.35, c);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    sx.globalAlpha = 1; sx.fillStyle = g; sx.beginPath();
    sx.arc(24,24,24,0,Math.PI*2); sx.fill();
    return sc;
  });
  var parts = [];
  function build(){
    var area = W * H;
    var n = Math.max(28, Math.min(86, Math.round(area / 15000)));
    parts = [];
    for (var i=0;i<n;i++){
      var big = Math.random() < 0.16;
      parts.push({
        x: Math.random()*W, y: Math.random()*H,
        r: big ? (10 + Math.random()*14) : (1.1 + Math.random()*2.6),
        vy: (big ? 5 : 11) + Math.random()*16,
        amp: 6 + Math.random()*22, freq: .3 + Math.random()*.7, ph: Math.random()*6.28,
        a: big ? (.05 + Math.random()*.07) : (.32 + Math.random()*.45),
        tw: .6 + Math.random()*1.6,
        ci: big ? (Math.random()<.5?1:3) : Math.floor(Math.random()*colors.length)
      });
    }
  }
  function resize(){
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    build();
    if (reduce) drawStatic();
  }
  function drawStatic(){
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation = 'lighter';
    for (var i=0;i<parts.length;i++){
      var p = parts[i]; ctx.globalAlpha = p.a;
      ctx.drawImage(sprites[p.ci], p.x-p.r, p.y-p.r, p.r*2, p.r*2);
    }
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
  }
  var last = 0;
  function frame(t){
    var dt = last ? Math.min(.05, (t-last)/1000) : .016; last = t;
    var ts = t/1000;
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation = 'lighter';
    for (var i=0;i<parts.length;i++){
      var p = parts[i];
      p.y -= p.vy * dt;
      var x = p.x + Math.sin(ts*p.freq + p.ph) * p.amp;
      if (p.y < -p.r*2){ p.y = H + p.r*2; p.x = Math.random()*W; }
      var tw = p.a * (0.55 + 0.45*Math.sin(ts*p.tw + p.ph));
      ctx.globalAlpha = tw < 0 ? 0 : tw;
      ctx.drawImage(sprites[p.ci], x-p.r, p.y-p.r, p.r*2, p.r*2);
    }
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    raf = requestAnimationFrame(frame);
  }
  var raf = 0;
  function startMotes(){
    if (reduce){ drawStatic(); return; }
    if (!raf) raf = requestAnimationFrame(frame);
  }
  window.addEventListener('resize', resize);
  document.addEventListener('visibilitychange', function(){
    if (document.hidden){ if (raf){ cancelAnimationFrame(raf); raf = 0; last = 0; } }
    else startMotes();
  });

  var scene = document.getElementById('scene');
  function play(){
    scene.classList.remove('playing');
    void scene.offsetWidth; // force reflow to restart animations
    scene.classList.add('playing');
  }
  document.getElementById('replay').addEventListener('click', play);

  resize();
  startMotes();
  requestAnimationFrame(function(){ requestAnimationFrame(play); });
})();
</script>
